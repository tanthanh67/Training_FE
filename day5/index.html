<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div>💠 Transform - Hover từng ô</div>
        <div class="transform">
            <div class="translate">translate</div>
            <div class="rotate">rotate</div>
            <div class="scale">scale</div>
            <div class="combine">combine</div>
        </div>
        <div>🟩 Overlay effect - hover vào card</div>
        <div class="overlay">
            <div class="image1">
                <img src="https://images.pexels.com/photos/8102158/pexels-photo-8102158.jpeg" alt="1">
            </div>
            <div class="image2">
                <img src="https://images.pexels.com/photos/9797234/pexels-photo-9797234.jpeg" alt="2">
            </div>
            <div class="image3">
                <img src="https://images.pexels.com/photos/10254950/pexels-photo-10254950.jpeg" alt="3">
            </div>
        </div>
        <div>💥 @Keyframes animation</div>
        <div class="keyframes">
            <div class="bounce">bounce</div>
            <div class="spin">spin</div>
            <div class="pulse">pulse</div>
            <div class="slideIn">slideIn</div>
        </div>
        <div>⌛ CSS Loaders (Pure CSS)</div>
        <div class="loader">
            <div class="circle"></div>
            <div class="dot">
                <span class="dot-1"></span>
                <span class="dot-2"></span>
                <span class="dot-3"></span>
                
            </div>
            <div class="bar">
                <div class="bar-1"></div>
                <div class="bar-2"></div>
                <div class="bar-3"></div>
                <div class="bar-4"></div>
                <div class="bar-5"></div>
            </div>
        </div>
    </div>
</body>
</html>
